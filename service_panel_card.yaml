# ==============================================================================
# Lambda EU-L Series — Service Panel Recreation (Lovelace picture-elements card)
# ==============================================================================
# A pixel-overlay recreation of the original Lambda Sigmatek HMI service panel
# as a Home Assistant Lovelace card. State labels are positioned on top of a
# cleaned screenshot of the original panel.
#
# REQUIREMENTS:
# - lambda_heatpump.yaml installed (provides all eu20l_* sensor entities)
# - helpers.yaml installed (provides the two l_warmepumpe_* template helpers)
# - The background image lambda_panel_background.png copied to /config/www/
#
# INSTALLATION:
# 1. Copy images/lambda_panel_background.png from this repo to /config/www/
#    (so it is served at /local/lambda_panel_background.png).
# 2. Create a new dashboard view of type "Sidebar" (or any view that gives the
#    card enough horizontal space — the panel image has a fixed aspect ratio).
# 3. Add a manual card and paste the contents of this file as YAML.
#
# Optional customization: a flow-rate label is reserved for an external pump
# entity (see the commented-out nmt_pumpe_durchfluss element near the end).
# ==============================================================================

type: picture-elements
image: /local/lambda_panel_background.png
