      - name: "EU20L HC1 Set Cooling Mode Room Temperature 5052" # RW - Setting for cooling mode room setpoint temperature (min = 15.0°C; max = 40.0 °C) [same as 5051, but for cooling]
        unique_id: eu20l_5052
        address: 5052
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
