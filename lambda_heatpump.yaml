      - name: "EU20L Buff1 Request Heat Sink Temperature Difference Setpoint 3008" # RW - Requested temperature difference between flow line and return line. (min = 0.0K, max = 35.0K) -> Valid value is required!
        unique_id: eu20l_3008
        address: 3008
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature_delta     # See note above (for register 1018)
        state_class: measurement
        unit_of_measurement: "K"            # See note above (for register 1018)
        # scan_interval: 10

      - name: "EU20L Buff1 Modbus Request Heating Capacity 3009" # capacity (min = 0.0kW, max = 25,5kW) -> Value is optional.
        unique_id: eu20l_3009
        address: 3009
