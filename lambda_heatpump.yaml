    #
    ### Create new template sensors to produce values that are important but not directly provided by Lambda through Modbus (e.g. SCOP)
    #

template:
  - sensor:

    ### Create a new sensor to calculate the SCOP based on values delivered by the Lambda heat pump ###

      - name: "EU20L HP1 SCOP"
        unique_id: eu20l_hp1_scop_id
        state_class: measurement
        icon: mdi:chart-bell-curve-cumulative
        state: >
          {% set strom_total = states('sensor.eu20l_hp1_compressor_power_consumption_accumulated_1020') | float(0) %}
          {% set waerme_total = states('sensor.eu20l_hp1_compressor_thermal_energy_output_accumulated_1022') | float(0) %}
          {% if strom_total > 0 %}
            {{ (waerme_total / strom_total) | round(2) }}
          {% else %}
            0.0
          {% endif %}
          

    ### Create a new sensor to calculate the Delta between Line flow and Return flow (Spreizung Vorlauf/Rücklauf)
    
      - name: "EU20L HP1 Heat Pump Line/Return Flow Delta (dT)"
        unique_id: eu20l_hp1_heat_pump_line_return_flow_delta_dt_id
        state_class: measurement
        device_class: temperature_delta
        unit_of_measurement: "K"
        icon: mdi:thermometer-lines
        state: >
          {% set vl = states('sensor.eu20l_hp1_flow_line_temperature_1004') | float(0) %}
          {% set rl = states('sensor.eu20l_hp1_return_line_temperature_1005') | float(0) %}
          {{ (vl - rl) | round(1) }}

    ### Create a new sensor to be able to calculate a better SCOP based on more exact base values (idea by thecem) ###
      - name: "EU20L HP1 Heating Power calculated"
        unique_id: eu20l_hp1_heating_power_calculated_id
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        state: >
          {% set flow = states('sensor.eu20l_hp1_volume_flow_heat_sink_1006') | float(0) %}
          {% set delta_t = states('sensor.eu20l_hp1_heat_pump_line_return_flow_delta_dt') | float(0) %}
          
          {# Calculation: flow * DeltaT * heat capacity of water (1.163) #}
          {# We now also allow negative values for defrost cycles (Defrost or Central Cooling) #}
          
          {% if flow > 0 %}
            {{ (flow * delta_t * 1.163) | round(0) }}
          {% else %}
            0
          {% endif %}

    ### Create a new sensor to calculate the difference between the heating power provided by the heat pump and the calculated heating power (see above)
    
      - name: "EU20L HP1 Heating Power Difference"
        unique_id: eu20l_hp1_heating_power_difference_id
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        state: >
          {% set orig = states('sensor.eu20l_hp1_actual_heating_capacity_1011') | float(0) %}
          {% set calc = states('sensor.eu20l_hp1_heating_power_calculated') | float(0) / 1000 %}
          {{ (calc - orig) | round(3) }}

    #
    ### Mapping of the numbers (for the possible states, types or modes) to the respective terms as defined in the official Lambda documentation (e.g. 0 → OFF, 1 → AUTOMATIK etc.)
    #

    ### Mapping for EU20L Ambient Operating State Register 0001 ###
      - name: "EU20L Ambient Operating State 0001 map"
        unique_id: eu20l_0001_map
        state: >-
          {% set mapper =  {
              '0' : 'Aus',
              '1' : 'Automatik',
              '2' : 'Manuell',
              '3' : 'Fehler' } %}
          {% set state = states('sensor.eu20l_ambient_operating_state_0001') %}
          {{ mapper[state] if state in mapper else 'Unknown' }}
        icon: >-
          {% set mapper =  {
              '0' : 'mdi:power-off',
              '1' : 'mdi:refresh-auto',
              '2' : 'mdi:hand-back-right',
              '3' : 'mdi:alert-circle-outline' } %}
          {% set state = states('sensor.eu20l_ambient_operating_state_0001') %}
          {{ mapper[state] if state in mapper else 'mdi:help-circle' }}

    ### Mapping for EU20L EMgr Operating State Register 0101 ###
      - name: "EU20L EMgr Operating State 0101 map"
        unique_id: eu20l_0101_map
        state: >-
          {% set mapper =  {
              '0' : 'Aus',
              '1' : 'Automatik',
              '2' : 'Manuell',
              '3' : 'Fehler',
              '4' : 'Offline' } %}
          {% set state = states('sensor.eu20l_emgr_operating_state_0101') %}
          {{ mapper[state] if state in mapper else 'Unknown' }}
        icon: >-
          {% set mapper =  {
              '0' : 'mdi:power-off',
              '1' : 'mdi:refresh-auto',
              '2' : 'mdi:hand-back-right',
              '3' : 'mdi:alert-circle-outline',
              '4' : 'mdi:network-off-outline' } %}
          {% set state = states('sensor.eu20l_emgr_operating_state_0101') %}
          {{ mapper[state] if state in mapper else 'mdi:help-circle' }}

    ### Mapping for HP1 Heat Pump Error State Register 1000 ###
      - name: "EU20L HP1 Heat Pump Error State 1000 map"
        unique_id: eu20l_1000_map
        state: >-
          {% set mapper =  {
              '0' : 'OK',
              '1' : 'MESSAGE',
              '2' : 'WARNING',
              '3' : 'ALARM',
              '4' : 'FAULT' } %}
          {% set state = states('sensor.eu20l_hp1_heat_pump_error_state_1000') %}
          {{ mapper[state] if state in mapper else 'Unknown' }}
        icon: >-
          {% set mapper =  {
              '0' : 'mdi:check-circle-outline',
              '1' : 'mdi:message-text-outline',
              '2' : 'mdi:alert-outline',
              '3' : 'mdi:bell-alert',
              '4' : 'mdi:alert-octagon' } %}
          {% set state = states('sensor.eu20l_hp1_heat_pump_error_state_1000') %}
          {{ mapper[state] if state in mapper else 'mdi:help-circle' }}

    ### Mapping for HP1 Heat Pump State Register 1002 - as displayed in the bottom row of the Lambda panel "Wärmepumpe" ###
      - name: "EU20L HP1 Heat Pump State 1002 map"
        unique_id: eu20l_1002_map # added for consistency
        state: >-
          {% set mapper =  {
              '0' : 'INIT',
              '1' : 'REFERENCE',
              '2' : 'Sperrzeit',
              '3' : 'Betriebsbereit',
              '4' : 'Vorlaufbetrieb',
              '5' : 'Verdichterstart',
              '6' : 'Vorregelbetrieb',
              '7' : 'Regelbetrieb',
              '8' : 'Not Used',
              '9' : 'Kühlen',
              '10' : 'Abtauung',
              '20' : 'STOPPING',
              '30' : 'FAULT-LOCK',
              '31' : 'ALARM-BLOCK',
              '40' : 'ERROR-RESET' } %}
          {% set state = states('sensor.eu20l_hp1_heat_pump_state_1002') %}
          {{ mapper[state] if state in mapper else 'Unknown' }}
        icon: >-
          {% set mapper =  {
              '0' : 'mdi:heat-pump-outline',
              '1' : 'mdi:heat-pump-outline',
              '2' : 'mdi:timer-pause-outline',
              '3' : 'mdi:timer-stop-outline',
              '4' : 'mdi:restart',
              '5' : 'mdi:restart',
              '6' : 'mdi:heat-pump-outline',
              '7' : 'mdi:heat-pump-outline',
              '8' : 'mdi:help-circle-outline',
              '9' : 'mdi:sun-snowflake-variant',
              '10' : 'mdi:snowflake-melt',
              '20' : 'mdi:stop-circle-outline',
              '30' : 'mdi:alert-circle-outline',
              '31' : 'mdi:alarm-light-outline',
              '40' : 'mdi:alarm-light-off-outline' } %}
          {% set state = states('sensor.eu20l_hp1_heat_pump_state_1002') %}
          {{ mapper[state] if state in mapper else '' }}

    ### Mapping for HP1 Heat Pump Operating State Register 1003 ###
      - name: "EU20L HP1 Heat Pump Operating State 1003 map"
        unique_id: eu20l_1003_map # added for consistency
        state: >-
          {% set mapper = {
              '0' : 'Standby',
              '1' : 'Heizen',
              '2' : 'Brauchwasser',
              '3' : 'CC / Verdichterbetrieb',
              '4' : 'Umwälzbetrieb',
              '5' : 'Abtauen',
              '6' : 'Aus',
              '7' : 'FrostschutzbetriebT',
              '8' : 'Frostschutzbereitschaft',
