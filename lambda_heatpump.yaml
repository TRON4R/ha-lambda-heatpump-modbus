#
### End of ModBus Definitions ###
#
    #
    ### Definition of climate sensors for the dashboard to be able to easily adjust Lambda settings in HA (write to registers defined as RW)
    #
    
    climates:
      - name: "λ Heizkurve Solltemperatur Offset"
        unique_id: lambda_hc1_offset_thermostat_id
        address: 5050                # Wir lesen das Offset-Register (Ist-Zustand)
        target_temp_register: 5050   # Wir schreiben auf das gleiche Register
        data_type: int16
        scale: 0.1
        precision: 1
        max_temp: 5.0
        min_temp: -5.0
        temp_step: 0.5
        temperature_unit: "K"        # Kelvin unit (for temperature delta)
        target_temp_write_registers: true  # for FC16
        hvac_mode_register:
          address: 5001              # Optional: so that "Auto/Heizen/Aus" can also be switched
          values:
            state_off: 12
            state_heat: 0
            state_auto: 1
            state_cool: 2
          #write_registers: true

      - name: "λ Brauchwasser-Thermostat" # freely chosen name. Starting with the same term is recommended for easier searches in HA 
        unique_id: EU20L_boil1_domestic_hot_water_id
        address: 2002
        data_type: int16          
        min_temp: 45
        max_temp: 54
        scale: 0.1
        precision: 1
        target_temp_register: 2050
        target_temp_write_registers: true
        temp_step: 1
        temperature_unit: "°C"

      - name: "λ Raum-Thermostat" # Room thermostat - requires a WiFi thermometer in a living area. Can then theoretically replace a wired thermostat
        unique_id: EU20L_HC1_domestic_hot_water_id
        address: 5004 # IMPORTANT: this value must be written at least every 5 minutes, otherwise the Lambda falls back to default mode
        min_temp: 15
        max_temp: 35
        #offset: 0 # in case the room thermometer consistently reads too high or too low
        scale: 0.1
        precision: 1
        target_temp_register: 5051
        target_temp_write_registers: true
        temp_step: 0.5
        temperature_unit: "°C"

    #
    ### Experiment with number entities to control the Lambda
    # However, numbers: are still not accepted by the Modbus integration and simply ignored
    # so this is useless and can be commented out
    #
    #numbers:
