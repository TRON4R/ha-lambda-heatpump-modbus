      - name: "EU20L Buff1 Operating State 3001" # 0 = STBY,1 = HEATING,2 = COOLING,3 = SUMMER,4 = FROST,5 = HOLIDAY,6 = PRIO-STOP,7 = ERROR,8 = OFF,9 = STBY-FROST
        unique_id: eu20l_3001
        address: 3001
        data_type: uint16
