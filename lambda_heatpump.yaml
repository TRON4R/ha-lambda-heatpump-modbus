        scale: 0.1
        precision: 1
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        # scan_interval: 10
        
        
      - name: "EU20L Buff1 Set Maximum Buffer Temperature 3050" # RW - Setting for maximum buffer temperature (min = 25.0°C; max = 65.0°C)
        unique_id: eu20l_3050
        address: 3050 #(expects a value being written every 5 min [needs to be confirmed])
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        unit_of_measurement: "°C"
        # scan_interval: 10

    ### EU20L Heating Circuit 1 → HC1 (for easier typing access in HA if HC2, HC3 etc. exist)
    #   e.g. underfloor or radiator heating - for additonal heating circuits, this section needs to be duplicated, HC1 changed to HC2 and the second digit of the register address increased by 1
      
      - name: "EU20L HC1 Error Number 5000" # RO - 0 = No Error
