        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HC1 Room Device Temperature 5004" # RW - Actual temperature room device sensor (min = -29.9°C; max = 99.9°C) [can be used to regulate heat pump with any readable room temperature device]
        unique_id: eu20l_5004
        address: 5004
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HC1 Flow Line Temperature Setpoint 5005" # RW - Setpoint temperature flow line (min = 15.0°C; max = 65.0°C) [only applicable in MANUAL operating mode - see register 5006, but 1 is read-only over Modbus]
        unique_id: eu20l_5005
        address: 5005
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HC1 Operating Mode 5006" # RW - 0 = OFF(RW),1 = MANUAL(R),2 = AUTOMATIK(RW),3 = AUTO-HEATING(RW),4 = AUTO-COOLING(RW),5 = FROST(RW),6 = SUMMER(RW),7 = FLOOR-DRY(R) [setting to 1 or 7 requires using Lambda control panel]
        unique_id: eu20l_5006
        address: 5006
        data_type: int16
        # scan_interval: 10

    ### Register 5007 can't be read (despite being a read-only [RO] register). Hence the sensor needs to be deactivated to avoid unnecessary modbus load.
#       
#      - name: "EU20L HC1 Flow Line Target Temperature 5007" # RO - Target temperature flow line [calculated target temp (see 5002) based on ambient temp (0004), room target temp (5051), heating curve and offset (5050)]
