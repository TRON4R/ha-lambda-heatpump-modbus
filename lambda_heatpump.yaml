      - name: "EU20L HC1 Set Flow Line Temperature Offset 5050" # RW - Setting for flow line temperature setpoint offset (min = -10.0K; max = 10.0K) ["Heizkurve Solltemp Offset"]
        unique_id: eu20l_5050
        address: 5050 #(expects every 5 min a value) - actually not true. see page 5 paragraph 3.3 of the Modbus documentation - the 5 min timout applies only to register 00-49!
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature_delta # see notes above for register 1018
