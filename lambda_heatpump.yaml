        # The following 5 buffer registers (3004 to 3009) are RW-registers and probably more usefull for write access than to be read. 
        # You might want to simply deactive them by adding comment delimeters
      - name: "EU20L Buff1 Modbus Buffer Temperature High 3004" # RW - Actual temperature of buffer set via modbus (min = 0°C; max = 90°C)
        unique_id: eu20l_3004
        address: 3004
