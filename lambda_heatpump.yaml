        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10

      - name: "EU20L Buff1 Request Type 3005" # RW - -1 = INVALID REQUEST (can be used to deactivate modbus request immediately), 0 = NO, 1 = CIRCULATION ((is equal to NO REQUEST for buffer module), 2 = CENTRAL HEATING, 3 = CENTRAL COOLING
        unique_id: eu20l_3005
        address: 3005
        data_type: int16
        # scan_interval: 10

      - name: "EU20L Buff1 Request Flow Line Temperature Setpoint 3006" # RW - Requested flow line temperature. (min = 0.0°C, max = 65.0°C) -> Valid value is reuqired!
        unique_id: eu20l_3006
