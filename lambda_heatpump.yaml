#        address: 1016
#        data_type: int16 # added for consistency
#        scale: 0.1
#        precision: 1
#        device_class: temperature
#        state_class: measurement # added for consistency and to keep the data in HA longer than 10 days
#        unit_of_measurement: "°C"
#        # scan_interval: 10
#        
#      - name: "EU20L HP1 Requested Return Line Temperature 1017" # RW - Requested return line temperature. (min = 0.0°C, max = 65.0°C)
#        unique_id: eu20l_1017
#        address: 1017
#        data_type: int16 # added for consistency
#        scale: 0.1
#        precision: 1
#        device_class: temperature
#        state_class: measurement # added for consistency
#        unit_of_measurement: "°C"
#        # scan_interval: 10
#        
#      - name: "EU20L HP1 Requested Flow to Return Line Temperature Difference 1018" # RW - Request heat sink temp. diff - Requested temperature difference between flow line and return line. (min = 0.0K, max = 35.0K)
#        unique_id: eu20l_1018
#        address: 1018
#        data_type: int16 # added for consistency
#        scale: 0.1
#        precision: 1
#        device_class: temperature_delta # better class than temperature for this particular register
#        state_class: measurement # added for consistency
#        unit_of_measurement: "K" # Technically Kelvin is correct here and while HA might cause problems with class temperature, for temperature_delta "K" should be ok
#        # scan_interval: 10
        
      - name: "EU20L HP1 Relais state 2nd heating stage 1019" # [0/1] - 1 = NO-Relais for 2nd heating stage (heating rod) is activated [Read Only]
        # technically this definition could be changed to a 'binary_sensors:' in HA with 'device_class: heat' to automatically show ON or OFF in HA instead of numerical 0 or 1.
        unique_id: eu20l_1019
        address: 1019
        data_type: int16 # added for consistency
        # scan_interval: 10
        
      - name: "EU20L HP1 Compressor Power Consumption Accumulated 1020" # Statistic VdA E since last reset - Accumulated electrical energy consumption of compressor unit since last statistic reset
        unique_id: eu20l_1020
        address: 1020
        data_type: int32
        scale: 0.001 # was undefined (default = 1) - but needs to be adjusted because of the change from Wh to kWh
        precision: 2 # was undefined(default = 0) - but needs to be adjusted for the same reason above to show two decimal points
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: "kWh" # was: "Wh" - Original output of the Register is in Wh, but who wants millions of Wh if you can have kWh?
        # scan_interval: 10
        
      - name: "EU20L HP1 Compressor Thermal Energy Output Accumulated 1022" # Statistic VdA Q since last reset - Accumulated thermal energy output of compressor unit since last statistic reset
        unique_id: eu20l_1022 # corrected - was 1023
        address: 1022
        data_type: int32
        scale: 0.001 # was undefined (default = 1) - but needs to be adjusted because of the change from Wh to kWh
        precision: 2 # was undefined(default = 0) - but needs to be adjusted for the same reason above to show two decimal points
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: "kWh" # was: "Wh" - Original output of the Register is in Wh, but who wants millions of Wh if you can have kWh?
        # scan_interval: 10

    #
    #   for additonal heatpumps, all previous definitions for HP1 need to be duplicated, HP1 changed to HP2 and the second digit of the register address increased by 1 e.g. 1000 → 1100 and 1001 → 1101 etc.
    #

    ### Additional Registers detected by a Modbus scan ###
    #   These registers are NOT documented in the official Lambda Modbus definitions! Use at your own risk!

#      - name: "EU20L HP1 unknown 1024" # RO - Undocumented and unknown register - can probably be deactivated or commented with delimiters
#        unique_id: eu20l_1024
#        address: 1024
#        data_type: int16
#        # scan_interval: 3600

      - name: "EU20L HP1 VdA Max Rating 1025" # RO - Undocumented - value at Lambda control panel only available for users with level 3 or higher (Verdichteranlage: "Max. Rating")
        unique_id: eu20l_1025
        address: 1025
        data_type: int16
        scale: 0.01
        precision: 2
        # device_class: power_factor # not recommended for similar reasons as for register 1010 (compressor unit rating)
        state_class: measurement
        unit_of_measurement: "%"
        # scan_interval: 10

      - name: "EU20L HP1 Hot Gas Temperature 1026" # RO - Undocumented - value at Lambda control panel only available for users with level 3 or higher ("Heißgas")
        unique_id: eu20l_1026
        address: 1026
        data_type: int16
        scale: 0.01
        precision: 2
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"        
        # scan_interval: 10

      - name: "EU20L HP1 Subcooling Temperature 1027" # RO - Undocumented - value at Lambda control panel only available for users with level 2 or higher ("Unterkühlung")
        unique_id: eu20l_1027
        address: 1027
        data_type: int16
        scale: 0.01
        precision: 2
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10

      - name: "EU20L HP1 Suction Gas Temperature 1028" # RO - Undocumented - value at Lambda control panel only available for users with level 2 or higher ("Sauggas")
        unique_id: eu20l_1028
        address: 1028
        data_type: int16
        scale: 0.01
        precision: 2
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"        
        # scan_interval: 10

      - name: "EU20L HP1 Condensation Temperature 1029" # RO - Undocumented - value at Lambda control panel only available for users with level 2 or higher ("Kondensation")
        unique_id: eu20l_1029
        address: 1029
        data_type: int16
        scale: 0.01
        precision: 2
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"        
        # scan_interval: 10

      - name: "EU20L HP1 Evaporation Temperature 1030" # RO - Undocumented - value at Lambda control panel only available for users with level 2 or higher ("Verdampfung")
        unique_id: eu20l_1030
        address: 1030
        data_type: int16
        scale: 0.01
        precision: 2
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"        
        # scan_interval: 10

      - name: "EU20L HP1 EqM Rating 1031" # RO - Undocumented - value at Lambda main heatpump control panel as EqM ("Energiequellen-Motor oder -Modulation") and at panel Energy Source ("Energiequelle") as EqM-Rating.
                                          # Effectively the percentage of the maximum possible fan speed. Example: fan speed = 260 rpm of max. 610 rpm = 42.6%
        unique_id: eu20l_1031
        address: 1031
        data_type: int16
        scale: 0.01
        precision: 2
        # device_class: power_factor # not recommended for similar reasons as for register 1010 (compressor unit rating)
        state_class: measurement
        unit_of_measurement: "%"      
        # scan_interval: 10

      - name: "EU20L HP1 Expansion Valve Opening Angle 1032" # RO - Undocumented - value at Lambda control panel only available for users with level 2 or higher ("Öffnungswinkel")
        unique_id: eu20l_1032
        address: 1032
        data_type: int16
        scale: 0.01
        precision: 2
        # device_class: power_factor # not recommended for similar reasons as for register 1010 (compressor unit rating)
        state_class: measurement
        unit_of_measurement: "%"
        # scan_interval: 10

