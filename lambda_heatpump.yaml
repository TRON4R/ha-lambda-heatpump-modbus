# Lambda Heat Pump Modbus/TCP Integration
# based on Lambda Modbus specification dated 13.02.2025
# Change name according to your requirements, host to the IP of your heatpump
# 
# the contents of this file needs to be appended to the configuration.yaml in your HA-installation
# or saved in a folder named 'packages' for example as lambda_wp.yaml and then the following two lines 
#
# homeassistant:
#   packages: !include_dir_named packages
#
# need to be added somewhere in the first lines of the configuration.yaml 
#
# order of definitions:
#
#- name: "EU20L Error Code Number"      # 1. WHO (used both for the name and entity-ID - name can be changed in the UI into a 'friendly_name' later)
#  unique_id: eu20l_error_code_num      # 1. WHO (unique anchor in HA)
#  
#  address: 0000                        # 2. WHEREFROM (source / register number)
#  input_type: holding                  # 2. WHEREFROM (type - optional when default 'holding')
#
#  data_type: int16                     # 3. HOW (how to interprete - should always be set for consistency and easier debugging)
#  scale: 1                             # 3. HOW (factor - optional when '1')
#  precision: 0                         # 3. HOW (precision - optional when '0')
#
#  device_class: temperature            # 4. DISPLAY (class defines the way HA displays the values in graphs and tiles)
#  state_class: measurement             # 4. DISPLAY (kept by HA for long-term statistics)
#  unit_of_measurement: "°C"            # 4. DISPLAY (unit)
#
#
#  !!! Lambda heat pump owners with the latest Firmware V1.1.3 have reported that the word order of int32 registers has been changed !!!
#  !!! Adding a 'swap: word' to some or all entities containing a 'data_type: int32' or 'data_type: uint32' might be necessary       !!!
#
#
modbus:
  - name: "EU20L" # The name you want to use for the ModBus Hub in Home Assistant. Important for example for Helpers or Automations writing to any registers directly
    type: tcp
    host: 192.168.2.6 ## IP address of your Lambda in your local network
    port: 502

    sensors:
    #
    ### EU20L General Ambient → Ambient
    #
      - name: "EU20L Ambient Error Number 0000" # name used here in a YAML defines de facto the entity-id of the sensor. The actual name can then be changed in the GUI keeping this ID, effectively making them BOTH searchable.
        unique_id: eu20l_0000
        address: 0000
        data_type: int16
        # input_type: holding # is the default and hence doesn't need to be set here
        # state_class: total # is actually wrong here, since these values are error codes and not an accumulating statistical value such as power consumption
        # scale: 1 # is the default and hence doesn't need to be set here
        # precision: 0 # is the default for an INT16 and hence doesn't need to be set here
        # scan_interval: 10 # default value is 15 in Home Assistant. Entry kept for later in case a faster or slower interval is needed
        #
      - name: "EU20L Ambient Operating State 0001" # 0 = OFF, 1 = AUTOMATIK, 2 = MANUAL, 3 = ERROR
        unique_id: eu20l_0001
        address: 0001
        data_type: uint16
        # device_class: enum # was recommendedb by Gemini to have HA automatically produce the right graphs. But is technically not correct
        # scan_interval: 10
        
      - name: "EU20L Ambient Temperature Actual 0002" #RW Actual ambient temperature (min = -50.0°C; max = 80.0°C)
        unique_id: eu20l_0002
        address: 0002
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C" # units are better always put in quotation marks, because special characters such as % might crash the parser
        # scan_interval: 10
        
      - name: "EU20L Ambient Temperature Average 1h 0003" # Arithmetic average temperature of the last 60 minutes
        unique_id: eu20l_0003
        address: 0003
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement # added to have a long-term statistic in HA
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L Ambient Temperature Calculated 0004" # Temperature for calculations in heat distribution modules
        unique_id: eu20l_0004
        address: 0004
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10

    ### EU20L E-Manager → EMgr
    #   deactivate this section (using comment delimiters) in case you have no E-Manager active

      - name: "EU20L EMgr Error Number 0100" # not E-Manager, because then the search in HA would require to type E_Manager
        unique_id: eu20l_0100
        address: 100 # has to be written without the leading 0. If you write 0100 instead HA can't connect to the register
        data_type: int16
        # scan_interval: 10
        
      - name: "EU20L EMgr Operating State 0101" # 0 = OFF, 1 = AUTOMATIK, 2 = MANUAL, 3 = ERROR, 4 = OFFLINE
        unique_id: eu20l_0101
        address: 101 # has to be written without the leading 0. 
        data_type: uint16
        # scan_interval: 10
        
      - name: "EU20L EMgr Power Actual 0102" # RW Actual input power [UINT16 (min = 0W; max = 65535W)] or actual excess power [INT16 (min = -32768W; max = 32767W)] (depends on settings in Module)
        unique_id: eu20l_0102
        address: 102 # has to be written without the leading 0. 
        data_type: int16 # uint16 - depending on settings in Lambda control unit (Module) - use int16 if your HEMS sends surplus as negative values and uint16 if it sends it as positive values
        device_class: power
        state_class: measurement # recommended so that HA is creating a long-term statistic for the input values as well to compare with 0103 and 0104
        unit_of_measurement: "W"
        # scan_interval: 5
        
      - name: "EU20L EMgr Power Consumption Actual 0103" # Actual power consumption of all configurated heat pumps
        unique_id: eu20l_0103
        address: 103 # has to be written without the leading 0. 
        data_type: int16
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        # scan_interval: 5
        
      - name: "EU20L EMgr Power Consumption Setpoint 0104" # Power consumption setpoint as a sum for all heat pumps
        unique_id: eu20l_0104
        address: 104 # has to be written without the leading 0. 
        data_type: int16
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        # scan_interval: 10

    ### EU20L Heat Pump 1 → HP1
    #   for additonal heatpumps, this section needs to be duplicated, HP1 changed to HP2 and the second digit of the register address increased by 1 e.g. 1000 → 1100 and 1001 → 1101 etc.
    
      - name: "EU20L HP1 Heat Pump Error State 1000" # 0 = NONE, 1 = MESSAGE, 2 = WARNING, 3 = ALARM, 4 = FAULT
        unique_id: eu20l_1000
        address: 1000
        data_type: uint16
        # scan_interval: 10
        
      - name: "EU20L HP1 Heat Pump Error Number 1001" # Scrolling through all active error numbers (Nr.1 - Nr.99)
        unique_id: eu20l_1001
        address: 1001
        data_type: int16
        # scan_interval: 10
        
      - name: "EU20L HP1 Heat Pump State 1002" # 0 = INIT,1 = REFERENCE,2 = RESTART-BLOCK,3 = READY,4 = START PUMPS,5 = START COMPRESSOR,6 = PRE-REGULATION,7 = REGULATION,8 = Not Used,9 = COOLING,10 = DEFROSTING,20 = STOPPING,30 = FAULT-LOCK,31 = ALARM-BLOCK,40 = ERROR-RESET
        unique_id: eu20l_1002
        address: 1002
        data_type: uint16
        # scan_interval: 10
        
      - name: "EU20L HP1 Operating State 1003" # 0 = STBY,1 = CH,2 = DHW,3 = CC,4 = CIRCULATE,5 = DEFROST,6 = AUS,7 = FROST,8 = STBY-FROST,9 = Not used,10 = SUMMER,11 = HOLIDAY,12 = ERROR,13 = WARNING,14 = INFO-MESSAGE,15 = TIME-BLOCK,16 = RELEASE-BLOCK,17 = MINTEMP-BLOCK,18 = FIRMWARE-DOWNLOAD
        unique_id: eu20l_1003
        address: 1003
        data_type: uint16
        # scan_interval: 10
        
      - name: "EU20L HP1 Flow Line Temperature 1004" # T-Flow - switched register name with register description on purpose since T-Flow isn't really helping in any HA search, when you're looking for the flow line temperature 
        unique_id: eu20l_1004
        address: 1004
        data_type: int16
        scale: 0.01
        precision: 1 # one decimal place is sufficient for temperature. Lambda also only shows 39.3 °C and not 39.34 °C.
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HP1 Return Line Temperature 1005" # T-Return
        unique_id: eu20l_1005
        address: 1005
        data_type: int16
        scale: 0.01
        precision: 1 # one decimal place is sufficient for temperature
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HP1 Volume Flow Heat Sink 1006" # Volume flow heat sink
        unique_id: eu20l_1006
        address: 1006
        data_type: int16
        device_class: volume_flow_rate # was: volume
        state_class: measurement # was: total
        unit_of_measurement: "L/h"
        # scan_interval: 10
        
      - name: "EU20L HP1 Energy Source Inlet Temperature 1007" # T-EQin
        unique_id: eu20l_1007
        address: 1007
        data_type: int16
        scale: 0.01
        precision: 1 # one decimal place is sufficient for temperature
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HP1 Energy Source Outlet Temperature 1008" # T-EQout
        unique_id: eu20l_1008
        address: 1008
        data_type: int16
        scale: 0.01
        precision: 1 # one decimal place is sufficient for temperature
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        # scan_interval: 10
        
      - name: "EU20L HP1 Volume Flow Energy Source 1009" # Volume flow energy source - seems to be 0 all the time
        unique_id: eu20l_1009
        address: 1009
        data_type: int16
        scale: 0.01
        precision: 2
        unit_of_measurement: "L/min"
        device_class: volume_flow_rate # was: volume
        state_class: measurement # was: total
        # scan_interval: 10
        
      - name: "EU20L HP1 Compressor Rating 1010" # Compressor unit rating
        unique_id: eu20l_1010
        address: 1010
        data_type: uint16
        scale: 0.01
        precision: 2
        # device_class: power_factor # not correct class according to Gemini 3 Pro and ChatGPT 5.1 Pro
        state_class: measurement
        unit_of_measurement: "%"
        # scan_interval: 10
        
      - name: "EU20L HP1 Actual Heating Capacity 1011" # Qp heating
        unique_id: eu20l_1011
        address: 1011
        data_type: int16
        scale: 0.1
        precision: 1        
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        # scan_interval: 10
        
      - name: "EU20L HP1 Inverter Power Consumption 1012" # Frequency inverter (FI) actual power consumption
        unique_id: eu20l_1012
        address: 1012
        data_type: int16
        scale: 0.001 # was: 1 - but needs to be adjusted due to change to kW (see 4 lines below)
        precision: 3 # was: 0 - but needs to be adjusted as well to show three decimal digits
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW" # was: "W" - Original Output from the register is in W, but kW is what's used in all other systems (evcc, HA power flow card and even the Lambda Display Unit )
        # scan_interval: 10
        
      - name: "EU20L HP1 COP 1013" # Coefficient of performance
        unique_id: eu20l_1013
        address: 1013
        data_type: int16
        scale: 0.01
        precision: 2
        # device_class: power_factor # device_class: power_factor is defined electrotechnical (Cosinus Phi) and expects values between 0 and 1 (or 0 to 100%)
        state_class: measurement
        # unit_of_measurement: "%" # The COP is a dimensionless number (unitless ratio / efficiency factor), not a percentage.
        # scan_interval: 10
        
#
# Register 1014: Modbus request release password - RW - UINT16 - [Nr] - Password register to release modbus request registers (maximum 10 retries are possieble)
# not defined on purpose - including this register in the definitions for Home Assistant would make no sense

#
# Register 1015 to 1018 can be deactivated as well. They consistently only show a value of "0" and you probably never want to write to these registers using Modbus
# If you comment register 1015 with a delimiter, also comment the template sensor below for mapping 1015 to texts
#
#        
#      - name: "EU20L HP1 Request Type 1015" # RW - 0 = NO REQUEST, 1 = FLOW PUMP CIRCULATION, 2 = CENTRAL HEATING, 3 = CENTRAL COOLING, 4 = DOMESTIC HOT WATER
